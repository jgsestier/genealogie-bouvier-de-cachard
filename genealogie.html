*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#0f0f1e;color:#e0e0e0;height:100vh;overflow:hidden}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(16,16,34,0.97);border-bottom:1px solid rgba(123,104,238,0.25);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:1000;backdrop-filter:blur(12px)}
.logo{font-size:18px;font-weight:300;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#e94560,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.search-box{position:relative;flex:0 1 360px}
.search-box input{width:100%;padding:8px 14px 8px 36px;border:1px solid rgba(123,104,238,0.25);border-radius:8px;background:rgba(255,255,255,0.04);color:#e0e0e0;font-size:13px;transition:all .2s}
.search-box input:focus{outline:none;border-color:rgba(123,104,238,0.6);background:rgba(255,255,255,0.07);box-shadow:0 0 12px rgba(123,104,238,0.15)}
.search-box input::placeholder{color:rgba(224,224,224,0.35)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(224,224,224,0.35);font-size:14px;pointer-events:none}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(16,16,34,0.98);border:1px solid rgba(123,104,238,0.3);border-radius:8px;max-height:320px;overflow-y:auto;display:none;z-index:1001;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.dropdown.show{display:block}
.dropdown-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(123,104,238,0.08);transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.dropdown-item:hover{background:rgba(123,104,238,0.15)}
.dropdown-item .name{font-size:13px;color:#e0e0e0}
.dropdown-item .era-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stats-bar{display:flex;gap:18px;margin-left:auto;font-size:12px;color:rgba(224,224,224,0.5)}
.stats-bar span{color:#f5a623;font-weight:600}

/* BREADCRUMB */
.breadcrumb{position:fixed;top:60px;left:0;right:0;height:32px;background:rgba(16,16,34,0.9);border-bottom:1px solid rgba(123,104,238,0.12);display:flex;align-items:center;padding:0 20px;gap:6px;z-index:999;font-size:11px;color:rgba(224,224,224,0.4);overflow-x:auto;white-space:nowrap}
.breadcrumb span{cursor:pointer;transition:color .15s}
.breadcrumb span:hover{color:#f5a623}
.breadcrumb .sep{color:rgba(123,104,238,0.3);cursor:default}

/* TOOLBAR */
.toolbar{position:fixed;right:16px;top:110px;display:flex;flex-direction:column;gap:6px;z-index:999}
.toolbar button{width:38px;height:38px;border:1px solid rgba(123,104,238,0.25);border-radius:8px;background:rgba(16,16,34,0.95);color:#e0e0e0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.toolbar button:hover{background:rgba(123,104,238,0.2);border-color:rgba(123,104,238,0.5)}

/* TREE AREA */
.tree-area{position:fixed;top:92px;left:0;right:0;bottom:0}
.node-bg{fill:rgba(16,16,34,0.9);stroke:rgba(123,104,238,0.2);stroke-width:1;rx:6;cursor:pointer;transition:all .2s}
.node-bg:hover{stroke:rgba(123,104,238,0.5);fill:rgba(16,16,34,0.95)}
.node-text{font-size:11px;fill:#e0e0e0;pointer-events:none}
.node-dates{font-size:9px;fill:rgba(224,224,224,0.45);pointer-events:none}
.link-path{fill:none;stroke:rgba(123,104,238,0.15);stroke-width:1.5}
.node-group.search-match .node-bg{filter:drop-shadow(0 0 8px rgba(245,166,35,0.8)) brightness(1.2)}
.node-group.search-dim{opacity:0.15}
.link-path.search-dim{opacity:0.05}

/* MINIMAP */
.minimap{position:fixed;bottom:16px;left:16px;width:160px;height:120px;background:rgba(16,16,34,0.95);border:1px solid rgba(123,104,238,0.25);border-radius:8px;z-index:999;overflow:hidden}
.minimap-viewport{fill:none;stroke:#e94560;stroke-width:1.5;opacity:0.6}

/* LEGEND */
.legend{position:fixed;bottom:150px;left:16px;display:flex;flex-direction:column;gap:4px;z-index:999;font-size:11px;color:rgba(224,224,224,0.5)}
.legend-entry{display:flex;align-items:center;gap:6px}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* SIDEBAR */
.sidebar{position:fixed;right:-360px;top:92px;bottom:0;width:360px;background:rgba(16,16,34,0.98);border-left:1px solid rgba(123,104,238,0.25);z-index:998;transition:right .3s;overflow-y:auto;padding:20px;backdrop-filter:blur(12px)}
.sidebar.open{right:0}
.sidebar-header{margin-bottom:16px;position:relative}
.close-btn{position:absolute;top:0;right:0;background:none;border:none;color:rgba(224,224,224,0.5);font-size:18px;cursor:pointer}
.close-btn:hover{color:#e94560}
.sidebar-name{font-size:18px;font-weight:600;color:#f5a623;padding-right:30px}
.sidebar-dates{font-size:13px;color:rgba(224,224,224,0.5);margin-top:4px}
.sidebar-section{margin-bottom:14px}
.sidebar-section h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(123,104,238,0.6);margin-bottom:6px}
.sidebar-section p{font-size:13px;line-height:1.5;color:rgba(224,224,224,0.8)}
.child-link{display:block;padding:6px 10px;margin:3px 0;border-radius:6px;background:rgba(123,104,238,0.08);color:#e0e0e0;font-size:12px;cursor:pointer;transition:background .15s;border:none;text-align:left;width:100%}
.child-link:hover{background:rgba(123,104,238,0.2)}

@media(max-width:768px){
  .topbar{padding:0 10px;gap:8px}
  .logo{font-size:14px}
  .minimap{width:140px;height:100px}
  .legend{left:160px;font-size:10px}
  .stats-bar{display:none}
  .toolbar button{width:34px;height:34px;font-size:15px}
}
</style>

  <div class="legend-entry"><div class="legend-dot" style="background:#06d6a0"></div>Moderne</div>
  <div class="legend-entry"><div class="legend-dot" style="background:#ff6b6b"></div>Contemporain</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  </div>

// ==========================================================================
// D3 TREE VISUALIZATION
// ==========================================================================
let svg, g, zoomBehavior, root, treeLay;
let nodeWidth = 170, nodeHeight = 54;
let allFlatNodes = [];
const duration = 400;

function eraColor(year) {
  if (!year) return '#ff6b6b';
  if (year < 1500) return '#e94560';
  if (year < 1650) return '#f5a623';
  if (year < 1789) return '#7b68ee';
  if (year < 1870) return '#00b4d8';
  if (year < 1945) return '#06d6a0';
  return '#ff6b6b';
}

function eraColorDark(year) {
  if (!year) return 'rgba(255,107,107,0.15)';
  if (year < 1500) return 'rgba(233,69,96,0.18)';
  if (year < 1650) return 'rgba(245,166,35,0.15)';
  if (year < 1789) return 'rgba(123,104,238,0.15)';
  if (year < 1870) return 'rgba(0,180,216,0.15)';
  if (year < 1945) return 'rgba(6,214,160,0.15)';
  return 'rgba(255,107,107,0.15)';
}

function fmtDates(d) {
  if (d.data.b && d.data.d) return d.data.b + ' - ' + d.data.d;
  if (d.data.d) return '\u2020' + d.data.d;
  if (d.data.b) return 'n. ' + d.data.b;
  return '';
}

function shortName(name) {
  if (name.length <= 22) return name;
  let s = name.replace(/de BOUVIER de CACHARD/g, 'de B. de C.');
  s = s.replace(/de BOUVIER de MONTMEYRAN/g, 'de B. de M.');
  s = s.replace(/de BOUVIER/g, 'de B.');
  s = s.replace(/DUCOS DE LA HAILLE/g, 'D. DE LA H.');
  if (s.length <= 24) return s;
  return s.substring(0, 22) + '...';
}

function init() {
  const container = document.getElementById('treeArea');
  const W = container.clientWidth;
  const H = container.clientHeight;
  svg = d3.select('#treeArea').append('svg').attr('width', W).attr('height', H);
  g = svg.append('g').attr('class', 'tree-g');
  zoomBehavior = d3.zoom().scaleExtent([0.05, 4]).on('zoom', (e) => { g.attr('transform', e.transform); updateMinimap(); });
  svg.call(zoomBehavior);
  root = d3.hierarchy(DATA);
  root.x0 = H / 2;
  root.y0 = 0;
  root.descendants().forEach((d) => { if (d.depth > 2 && d.children) { d._children = d.children; d.children = null; } });
  treeLay = d3.tree().nodeSize([nodeHeight + 8, nodeWidth + 60]);
  updateTree(root);
  document.getElementById('countStat').textContent = countAllNodes(DATA);
  document.getElementById('genStat').textContent = maxDepth(DATA);
  setTimeout(fitAll, 300);
  buildFlatIndex(DATA, []);
  initMinimap();
}

function countAllNodes(n) { let c = 1; if (n.children) n.children.forEach(ch => c += countAllNodes(ch)); return c; }
function maxDepth(n, d=1) { if (!n.children || n.children.length === 0) return d; return Math.max(...n.children.map(ch => maxDepth(ch, d+1))); }

function buildFlatIndex(node, path) {
  allFlatNodes.push({name: node.name, b: node.b, d: node.d, notes: node.notes, spouse: node.spouse, path: [...path, node.name]});
  if (node.children) node.children.forEach(ch => buildFlatIndex(ch, [...path, node.name]));
}

// ==========================================================================
// UPDATE TREE
// ==========================================================================
function updateTree(source) {
  const treeData = treeLay(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  const node = g.selectAll('.node-group').data(nodes, d => d.data.name + (d.data.b || ''));

  const nodeEnter = node.enter().append('g').attr('class', 'node-group')
    .attr('transform', `translate(${source.y0 || 0},${source.x0 || 0})`)
    .on('click', (e, d) => { showSidebar(d); if (d.children) { d._children = d.children; d.children = null; } else if (d._children) { d.children = d._children; d._children = null; } updateTree(d); })

  nodeEnter.append('rect').attr('class', 'node-bg').attr('x', -2).attr('y', -nodeHeight/2).attr('width', nodeWidth).attr('height', nodeHeight).attr('fill', d => eraColorDark(d.data.b));
  nodeEnter.append('rect').attr('x', -2).attr('y', -nodeHeight/2).attr('width', 4).attr('height', nodeHeight).attr('fill', d => eraColor(d.data.b)).attr('rx', 2);
  nodeEnter.append('text').attr('class', 'node-text').attr('x', 10).attr('y', -4).text(d => shortName(d.data.name));
  nodeEnter.append('text').attr('class', 'node-dates').attr('x', 10).attr('y', 12).text(d => fmtDates(d));
  nodeEnter.append('text').attr('x', nodeWidth - 12).attr('y', 4).attr('text-anchor', 'end').attr('fill', 'rgba(123,104,238,0.4)').attr('font-size', '12px').text(d => (d._children || d.children) ? (d._children ? '+' : '-') : '');

  const nodeUpdate = nodeEnter.merge(node);
  nodeUpdate.transition().duration(duration).attr('transform', d => `translate(${d.y},${d.x})`);
  nodeUpdate.select('text:last-child').text(d => (d._children || d.children) ? (d._children ? '+' : '-') : '');

  const nodeExit = node.exit().transition().duration(duration).attr('transform', `translate(${source.y},${source.x})`).remove();
  nodeExit.select('rect').attr('opacity', 0);

  const link = g.selectAll('.link-path').data(links, d => d.target.data.name + (d.target.data.b || ''));
  const linkEnter = link.enter().insert('path', 'g').attr('class', 'link-path').attr('d', () => { const o = {x: source.x0 || 0, y: source.y0 || 0}; return d3.linkHorizontal().x(d => d.y).y(d => d.x)({source: o, target: o}); });
  linkEnter.merge(link).transition().duration(duration).attr('d', d => d3.linkHorizontal().x(d => d.y).y(d => d.x)(d));
  link.exit().transition().duration(duration).attr('d', () => { const o = {x: source.x, y: source.y}; return d3.linkHorizontal().x(d => d.y).y(d => d.x)({source: o, target: o}); }).remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
  updateMinimap();
}

// ==========================================================================
// NAVIGATION
// ==========================================================================
function zoomIn() { svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.3); }
function zoomOut() { svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.7); }

function fitAll() {
  const nodes = root.descendants();
  if (nodes.length === 0) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(d => { if (d.x < minX) minX = d.x; if (d.x > maxX) maxX = d.x; if (d.y < minY) minY = d.y; if (d.y > maxY) maxY = d.y; });
  const container = document.getElementById('treeArea');
  const W = container.clientWidth, H = container.clientHeight;
  const treeW = maxY - minY + nodeWidth + 100, treeH = maxX - minX + nodeHeight + 100;
  const scale = Math.min(W / treeW, H / treeH, 1.5) * 0.9;
  const tx = W / 2 - ((minY + maxY) / 2 + nodeWidth / 2) * scale;
  const ty = H / 2 - ((minX + maxX) / 2) * scale;
  svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function goToRoot() {
  const container = document.getElementById('treeArea');
  const W = container.clientWidth, H = container.clientHeight;
  svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity.translate(80, H / 2).scale(0.8));
  updateBreadcrumb(root);
}

function expandAll() {
  function expand(d) { if (d._children) { d.children = d._children; d._children = null; } if (d.children) d.children.forEach(expand); }
  expand(root);
  updateTree(root);
  setTimeout(fitAll, 500);
}

function collapseAll() {
  root.descendants().forEach(d => { if (d.depth > 1 && d.children) { d._children = d.children; d.children = null; } });
  updateTree(root);
  setTimeout(fitAll, 500);
}

// ==========================================================================
// MINIMAP
// ==========================================================================
let minimapSvg, minimapG, minimapRect, minimapVisible = true;

function initMinimap() {
  const mm = document.querySelector('.minimap');
  minimapSvg = d3.select(mm).append('svg').attr('width', 160).attr('height', 120);
  minimapG = minimapSvg.append('g');
  minimapRect = minimapSvg.append('rect').attr('class', 'minimap-viewport');
  updateMinimap();
}

function updateMinimap() {
  if (!minimapSvg || !minimapVisible) return;
  const nodes = root.descendants();
  if (nodes.length === 0) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(d => { if (d.x < minX) minX = d.x; if (d.x > maxX) maxX = d.x; if (d.y < minY) minY = d.y; if (d.y > maxY) maxY = d.y; });
  const pad = 20;
  const sw = (maxY - minY) + pad * 2 || 1;
  const sh = (maxX - minX) + pad * 2 || 1;
  const scale = Math.min(160 / sw, 120 / sh);

  minimapG.selectAll('circle').data(nodes).join('circle')
    .attr('cx', d => (d.y - minY + pad) * scale).attr('cy', d => (d.x - minX + pad) * scale).attr('r', 1.5).attr('fill', d => eraColor(d.data.b));

  const t = d3.zoomTransform(svg.node());
  const container = document.getElementById('treeArea');
  const W = container.clientWidth, H = container.clientHeight;
  const vx = (-t.x / t.k - minY + pad) * scale;
  const vy = (-t.y / t.k - minX + pad) * scale;
  const vw = (W / t.k) * scale;
  const vh = (H / t.k) * scale;
  minimapRect.attr('x', vx).attr('y', vy).attr('width', vw).attr('height', vh);
}

function toggleMinimap() {
  minimapVisible = !minimapVisible;
  document.querySelector('.minimap').style.display = minimapVisible ? 'block' : 'none';
}

// ==========================================================================
// BREADCRUMB
// ==========================================================================
function updateBreadcrumb(d) {
  const path = [];
  let cur = d;
  while (cur) { path.unshift(cur); cur = cur.parent; }
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = path.map((p, i) => {
    const name = shortName(p.data.name);
    return (i > 0 ? '<span class="sep">›</span>' : '') + `<span onclick="navigateTo('${p.data.name.replace(/'/g, "\\'")}')">${name}</span>`;
  }).join('');
}

function navigateTo(name) {
  const node = findNodeByName(root, name);
  if (!node) return;
  const container = document.getElementById('treeArea');
  const W = container.clientWidth, H = container.clientHeight;
  const scale = 1;
  svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity.translate(W / 3 - node.y * scale, H / 2 - node.x * scale).scale(scale));
  updateBreadcrumb(node);
}

// ==========================================================================
// SIDEBAR
// ==========================================================================
function showSidebar(d) {
  document.getElementById('sidebarName').textContent = d.data.name;
  const dates = fmtDates(d);
  document.getElementById('sidebarDates').textContent = dates;
  let html = '';
  if (d.data.spouse) { html += `<div class="sidebar-section"><h4>Conjoint</h4><p>${d.data.spouse}</p></div>`; }
  if (d.data.notes) { html += `<div class="sidebar-section"><h4>Notes</h4><p>${d.data.notes}</p></div>`; }
  const allChildren = (d.children || []).concat(d._children || []);
  if (allChildren.length > 0) {
    html += '<div class="sidebar-section"><h4>Enfants (' + allChildren.length + ')</h4>';
    allChildren.forEach(c => {
      const cd = c.data.b ? ` (${c.data.b})` : '';
      html += `<button class="child-link" onclick="childNavigate('${c.data.name.replace(/'/g, "\\'")}')">${c.data.name}${cd}</button>`;
    });
    html += '</div>';
  }
  document.getElementById('sidebarContent').innerHTML = html;
  document.getElementById('sidebar').classList.add('open');
  updateBreadcrumb(d);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function childNavigate(name) {
  const node = findNodeByName(root, name);
  if (!node) return;
  if (node.parent && node.parent._children) { node.parent.children = node.parent._children; node.parent._children = null; updateTree(node.parent); }
  setTimeout(() => {
    const container = document.getElementById('treeArea');
    const W = container.clientWidth, H = container.clientHeight;
    svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity.translate(W / 3 - node.y, H / 2 - node.x));
    showSidebar(node);
  }, 500);
}

function findNodeByName(node, name) {
  if (node.data.name === name) return node;
  if (node.children) { for (const c of node.children) { const found = findNodeByName(c, name); if (found) return found; } }
  if (node._children) { for (const c of node._children) { const found = findNodeByName(c, name); if (found) return found; } }
  return null;
}

// ==========================================================================
// SEARCH
// ==========================================================================
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');

searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  dropdown.classList.remove('show');
  if (q.length < 2) return;
  const results = allFlatNodes.filter(n => n.name.toLowerCase().includes(q)).slice(0, 20);
  if (results.length === 0) { dropdown.innerHTML = '<div style="padding:10px 14px; color:#888;">Aucun resultat</div>'; dropdown.classList.add('show'); return; }
  dropdown.innerHTML = results.map(n => {
    const safeName = n.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const dates = n.b ? (n.d ? ` (${n.b}-${n.d})` : ` (n. ${n.b})`) : '';
    return `<div class="dropdown-item" onclick="searchGoto('${safeName}', ${n.b||0})"><span class="name">${n.name}${dates}</span><span class="era-dot" style="background:${eraColor(n.b)}"></span></div>`;
  }).join('');
  dropdown.classList.add('show');
});

function searchGoto(name, b) {
  dropdown.classList.remove('show');
  searchInput.value = '';
  allFlatNodes = [];
  buildFlatIndex(DATA, []);
  const entry = allFlatNodes.find(n => n.name === name && (n.b||0) === b);
  if (!entry) return;
  const path = entry.path;
  let current = root;
  for (const pname of path.slice(1)) {
    if (current._children) { current.children = current._children; current._children = null; }
    if (!current.children) break;
    const next = current.children.find(c => c.data.name === pname);
    if (next) current = next; else break;
  }
  updateTree(root);
  setTimeout(() => {
    const node = findNodeByName(root, name);
    if (!node) return;
    g.selectAll('.node-group').classed('search-match', false).classed('search-dim', false);
    g.selectAll('.link-path').classed('search-dim', false);
    const ancestors = new Set();
    let p = node;
    while (p) { ancestors.add(p); p = p.parent; }
    g.selectAll('.node-group').classed('search-match', d => d === node).classed('search-dim', d => !ancestors.has(d));
    g.selectAll('.link-path').classed('search-dim', l => !ancestors.has(l.source) && !ancestors.has(l.target));
    const scale = 1.2;
    const container = document.getElementById('treeArea');
    const W = container.clientWidth, H = container.clientHeight;
    svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity.translate(W / 2 - node.y * scale, H / 2 - node.x * scale).scale(scale));
    showSidebar(node);
  }, 500);
}

// ==========================================================================
// INIT
// ==========================================================================
window.addEventListener('load', init);
window.addEventListener('resize', () => {
  svg.attr('width', document.getElementById('treeArea').clientWidth)
     .attr('height', document.getElementById('treeArea').clientHeight);
});
</script>
